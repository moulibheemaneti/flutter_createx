name: flutter_createx
description: >-
  A terminal wizard for `flutter create` — browse and configure all flags
  interactively, preview the full command, then execute with one keystroke.
version: 1.1.1
repository: https://github.com/moulibheemaneti/flutter_createx
homepage: https://github.com/moulibheemaneti/flutter_createx
issue_tracker: https://github.com/moulibheemaneti/flutter_createx/issues

topics:
  - cli
  - flutter
  - developer-tools
  - terminal
  - scaffolding

screenshots:
  - description: flutter_createx interactive terminal wizard
    path: doc/assets/logo.png

environment:
  sdk: ">=3.0.0 <4.0.0"

# Add regular dependencies here.
dependencies:
  dart_console: ^5.0.0
  process_run: ^1.3.4

dev_dependencies:
  lints: ^6.0.0
  test: ^1.31.1
  dart_husky: ^1.2.2

executables:
  flutter_createx: main
